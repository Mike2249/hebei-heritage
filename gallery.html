<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河北非遗精粹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #f5f5f0;
            --accent: #c9a86c;
            --accent-light: #e8d5b5;
            --accent-dark: #a88a4e;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-light: #999999;
            --bg-primary: #fafaf8;
            --bg-secondary: #f0f0ec;
            --bg-dark: #1a1a1a;
            --border: #e5e5e0;
            --card-bg: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-jelly: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --navbar-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== Page Loader ===== */
        .page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        /* ===== Ripple Effect ===== */
        .ripple-container {
            position: relative;
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(201, 168, 108, 0.4);
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ===== Navbar ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--navbar-height);
            background: rgba(250, 250, 248, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            transition: var(--transition-normal);
        }

        .navbar.scrolled {
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .navbar-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 0.05em;
            position: relative;
        }

        .navbar-logo span {
            color: var(--accent);
            display: inline-block;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            padding: 8px 20px;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition-normal);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .nav-btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: #fff;
        }

        /* ===== Hero ===== */
        .hero {
            min-height: calc(100vh - var(--navbar-height));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 40px 60px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a86c' fill-opacity='0.03'%3E%3Cpath d='M20 20h-1v-1h1v1zm0-20h-1V0h1v0zM0 20H0h-1v-1h1v1z'/%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
            animation: pattern-float 20s linear infinite;
        }

        @keyframes pattern-float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle 15s infinite;
        }

        @keyframes float-particle {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
        }

        .hero-label {
            display: inline-block;
            padding: 6px 20px;
            background: var(--accent-light);
            color: var(--accent-dark);
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 50px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: slide-down 0.8s ease-out;
        }

        @keyframes slide-down {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: 0.05em;
            line-height: 1.3;
            animation: fade-up 0.8s ease-out 0.2s both;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 40px;
            animation: fade-up 0.8s ease-out 0.4s both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-search {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            position: relative;
            animation: fade-up 0.8s ease-out 0.6s both;
        }

        .hero-search input {
            width: 100%;
            padding: 18px 60px 18px 28px;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--card-bg);
            color: var(--text-primary);
            transition: var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }

        .hero-search input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(201, 168, 108, 0.15), var(--shadow-md);
        }

        .hero-search input::placeholder {
            color: var(--text-light);
        }

        .hero-search button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: var(--transition-bounce);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .hero-search button:hover {
            background: var(--accent-dark);
            transform: translateY(-50%) scale(1.1);
        }

        .hero-search button:active {
            transform: translateY(-50%) scale(0.95);
        }

        .hero-decoration {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.8rem;
            animation: float 2s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        .hero-decoration i {
            animation: bounce-arrow 1.5s ease-in-out infinite;
        }

        @keyframes bounce-arrow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        /* ===== Category Section ===== */
        .category-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 50px 40px 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .section-header .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
            position: relative;
            overflow: hidden;
        }

        .section-header .line::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100px;
            background: var(--accent);
            animation: line-shimmer 2s ease-in-out infinite;
        }

        @keyframes line-shimmer {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100% + 100px)); }
        }

        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            padding: 10px 22px;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition-bounce);
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-family: inherit;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .tag::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scale(0);
            border-radius: 50px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: -1;
        }

        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(201, 168, 108, 0.2);
        }

        .tag.active {
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(201, 168, 108, 0.3);
        }

        .tag.active::before {
            transform: scale(1);
        }

        /* Tag click animation */
        .tag.clicked {
            animation: tag-click 0.3s ease;
        }

        @keyframes tag-click {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        /* ===== Gallery Grid ===== */
        .gallery-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px 80px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
        }

        /* ===== Jelly Card Effect ===== */
        .gallery-item {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.1s ease-out, box-shadow var(--transition-slow);
            position: relative;
            text-decoration: none;
            color: inherit;
            display: block;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .gallery-item:hover {
            box-shadow: var(--shadow-lg);
        }

        /* Jelly deformation on mouse move */
        .gallery-item.jelly-effect {
            transition: transform 0.05s ease-out;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        /* Image shine effect */
        .image-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .gallery-item:hover .image-container::after {
            left: 100%;
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.6) 100%);
            opacity: 0;
            transition: opacity var(--transition-normal);
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .gallery-item:hover .image-overlay {
            opacity: 1;
        }

        .overlay-text {
            color: #fff;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
            transform: translateY(10px);
            opacity: 0;
            transition: var(--transition-normal);
        }

        .gallery-item:hover .overlay-text {
            transform: translateY(0);
            opacity: 1;
        }

        .overlay-text i {
            transition: transform var(--transition-normal);
        }

        .gallery-item:hover .overlay-text i {
            transform: translateX(4px);
        }

        .item-info {
            padding: 20px 22px;
            position: relative;
        }

        /* Info hover effect */
        .item-info::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            transform: scaleX(0);
            transition: transform var(--transition-normal);
        }

        .gallery-item:hover .item-info::before {
            transform: scaleX(1);
        }

        .item-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
            transition: color var(--transition-normal);
        }

        .gallery-item:hover .item-title {
            color: var(--accent-dark);
        }

        .item-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .item-location i {
            color: var(--accent);
            font-size: 0.75rem;
            transition: transform var(--transition-normal);
        }

        .gallery-item:hover .item-location i {
            transform: scale(1.2);
        }

        .item-category {
            display: inline-block;
            margin-top: 14px;
            padding: 5px 14px;
            background: var(--bg-secondary);
            color: var(--accent-dark);
            font-size: 0.75rem;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: var(--transition-normal);
        }

        .gallery-item:hover .item-category {
            background: var(--accent-light);
        }

        /* Card entrance animation */
        .gallery-item.fade-in {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
        }

        .gallery-item.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ===== No Results ===== */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }

        .no-results.show {
            display: block;
            animation: fade-up 0.5s ease;
        }

        .no-results i {
            font-size: 3.5rem;
            color: var(--border);
            margin-bottom: 20px;
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .no-results h3 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .no-results p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* ===== Footer ===== */
        .footer {
            background: var(--bg-dark);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .footer-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: 0.1em;
        }

        .footer-logo span {
            color: var(--accent);
        }

        .footer p {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* ===== Scroll to Top Button ===== */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 20px rgba(201, 168, 108, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: var(--transition-bounce);
            z-index: 99;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .scroll-top:hover {
            background: var(--accent-dark);
            transform: translateY(-5px) scale(1.1);
        }

        .scroll-top:active {
            transform: scale(0.95);
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ===== Cursor Trail Effect ===== */
        .cursor-trail {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
            opacity: 0.5;
            transition: transform 0.1s ease;
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }

            .hero {
                padding: 80px 20px 50px;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .category-section,
            .gallery-section {
                padding-left: 20px;
                padding-right: 20px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 16px;
            }

            .nav-btn {
                padding: 6px 14px;
                font-size: 0.8rem;
            }

            .scroll-top {
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }

            .cursor-trail {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .category-tags {
                gap: 8px;
            }

            .tag {
                padding: 8px 16px;
                font-size: 0.8rem;
            }

            .image-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">加载中...</div>
        </div>
    </div>

    <!-- Cursor Trail -->

            "衡水内画": "images/f0757582-cd72-4e68-96ea-a8abcc0a1293_100ff875-27d0-4046-9efc-0a8a7075eb59_衡水内画.png"

        let currentCategory = 'all';
        let searchQuery = '';
        let lastScrollY = 0;
        let scrollVelocity = 0;
        let ticking = false;

        function getImageSrc(name) {
            return imageMap[name] || '';
        }

        // ===== Page Loader =====
        function hideLoader() {
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 500);
        }

        // ===== Create Particles =====
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // ===== Ripple Effect =====
        function createRipple(event) {
            const element = event.currentTarget;
            const rect = element.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
            
            element.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        }

        // ===== Cursor Trail =====
        function initCursorTrail() {
            const trail = document.getElementById('cursorTrail');
            let mouseX = 0, mouseY = 0;
            let trailX = 0, trailY = 0;
            
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            
            function animateTrail() {
                trailX += (mouseX - trailX) * 0.15;
                trailY += (mouseY - trailY) * 0.15;
                trail.style.left = trailX - 10 + 'px';
                trail.style.top = trailY - 10 + 'px';
                requestAnimationFrame(animateTrail);
            }
            animateTrail();
        }

        // ===== Jelly Effect for Cards =====
        function initJellyEffect() {
            const cards = document.querySelectorAll('.gallery-item');
            
            cards.forEach(card => {
                let currentTransform = { x: 0, y: 0, scale: 1 };
                let targetTransform = { x: 0, y: 0, scale: 1 };
                
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    // Calculate rotation based on mouse position
                    const rotateX = (y - centerY) / centerY * -8;
                    const rotateY = (x - centerX) / centerX * 8;
                    
                    // Add scroll velocity influence for jelly effect
                    const jellyFactor = Math.min(Math.abs(scrollVelocity) / 50, 1);
                    const jellyScale = 1 + jellyFactor * 0.05;
                    
                    targetTransform = {
                        x: rotateX,
                        y: rotateY,
                        scale: jellyScale
                    };
                });
                
                card.addEventListener('mouseleave', () => {
                    targetTransform = { x: 0, y: 0, scale: 1 };
                });
                
                // Smooth animation loop
                function animate() {
                    currentTransform.x += (targetTransform.x - currentTransform.x) * 0.1;
                    currentTransform.y += (targetTransform.y - currentTransform.y) * 0.1;
                    currentTransform.scale += (targetTransform.scale - currentTransform.scale) * 0.1;
                    
                    card.style.transform = `perspective(1000px) rotateX(${currentTransform.x}deg) rotateY(${currentTransform.y}deg) scale(${currentTransform.scale})`;
                    
                    requestAnimationFrame(animate);
                }
                animate();
            });
        }

        // ===== Scroll Velocity Detection =====
        function initScrollVelocity() {
            window.addEventListener('scroll', () => {
                scrollVelocity = window.scrollY - lastScrollY;
                lastScrollY = window.scrollY;
                
                if (!ticking) {
                    requestAnimationFrame(() => {
                        // Apply jelly effect based on scroll velocity
                        const cards = document.querySelectorAll('.gallery-item');
                        cards.forEach(card => {
                            const velocityFactor = Math.min(Math.abs(scrollVelocity) / 100, 1);
                            const skewY = scrollVelocity > 0 ? velocityFactor * 2 : -velocityFactor * 2;
                            card.style.setProperty('--scroll-skew', skewY + 'deg');
                        });
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        }

        function init() {
            hideLoader();
            createParticles();
            initCursorTrail();
            initScrollVelocity();
            renderGallery();
            setupEventListeners();
            setupScrollEffects();
            
            // Initialize jelly effect after cards are rendered
            setTimeout(initJellyEffect, 100);
        }

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML = '';

            const filteredData = heritageData.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = !searchQuery ||
                    item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.location.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.category.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filteredData.length === 0) {
                noResults.classList.add('show');
            } else {
                noResults.classList.remove('show');
                filteredData.forEach((item, index) => {
                    const card = createGalleryCard(item, index);
                    grid.appendChild(card);
                });
            }
        }

        function createGalleryCard(item, index) {
            const a = document.createElement('a');
            a.className = 'gallery-item fade-in';
            a.href = `detail/${item.name}.html`;
            const imgSrc = getImageSrc(item.name);

            a.innerHTML = `
                <div class="image-container">
                    <img src="${imgSrc}" alt="${item.name}" loading="lazy" onerror="this.src='https://placehold.co/400x300/c9a86c/FFFFFF?text=${encodeURIComponent(item.name)}'">
                    <div class="image-overlay">
                        <span class="overlay-text">
                            <i class="fas fa-arrow-right"></i> 查看详情
                        </span>
                    </div>
                </div>
                <div class="item-info">
                    <h3 class="item-title">${item.name}</h3>
                    <div class="item-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${item.location}</span>
                    </div>
                    <span class="item-category">${item.category}</span>
                </div>
            `;

            // Staggered entrance animation
            setTimeout(() => { 
                a.classList.add('visible'); 
            }, index * 80);
            
            return a;
        }

        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderGallery();
                setTimeout(initJellyEffect, 200);
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            const tags = document.querySelectorAll('.tag');
            tags.forEach(tag => {
                tag.addEventListener('click', function(e) {
                    // Ripple effect
                    createRipple(e);
                    
                    // Click animation
                    this.classList.add('clicked');
                    setTimeout(() => this.classList.remove('clicked'), 300);
                    
                    // Update active state
                    tags.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    renderGallery();
                    setTimeout(initJellyEffect, 200);
                });
            });

            // Ripple for buttons
            document.querySelectorAll('.ripple-container').forEach(el => {
                el.addEventListener('click', createRipple);
            });
        }

        function setupScrollEffects() {
            const navbar = document.getElementById('navbar');
            const scrollTop = document.getElementById('scrollTop');
            const categorySection = document.getElementById('categorySection');

            window.addEventListener('scroll', () => {
                // Navbar effect
                navbar.classList.toggle('scrolled', window.scrollY > 50);
                
                // Scroll to top button
                if (window.scrollY > 500) {
                    scrollTop.classList.add('visible');
                } else {
                    scrollTop.classList.remove('visible');
                }
            });

            // Intersection Observer for fade-in
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            observer.observe(categorySection);
        }

        function performSearch() {
            searchQuery = document.getElementById('searchInput').value.trim();
            renderGallery();
            setTimeout(initJellyEffect, 200);
        }

        function scrollToGallery() {
            document.getElementById('categorySection').scrollIntoView({ behavior: 'smooth' });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
